version: '3.8'
services:
  mysql:
    image: mysql:8.0
    container_name: mysql_server
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: user
      MYSQL_PASSWORD: user
    # ports:
    #   - "3316:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./script:/docker-entrypoint-initdb.d
  
  java_app:
      build:
        context: .
        dockerfile: Dockerfile
      container_name: java_app
      restart: always
      environment:
        DATABASE_HOST: mysql
        DATABASE_PORT: 3306
        DATABASE_NAME: bankiut
        DATABASE_USER: root
        DATABASE_PASSWORD: root
      depends_on:
        - mysql
      ports:
        - "8090:8080"
volumes:
  db_data: